<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e8a96"/>
      <stop offset="1" stop-color="#083d44"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f5f0e6"/>
      <stop offset="1" stop-color="#d6cdb9"/>
    </linearGradient>
  </defs>
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#bg)"/>

  <!-- abacus -->
  <rect x="352" y="288" width="320" height="42" rx="8" fill="url(#stone)"/>

  <!-- baklava capital band -->
  <rect x="372" y="330" width="280" height="88" fill="#8f8267"/>
  <!-- diamond 1 -->
  <polygon points="407,330 442,374 407,418 372,374" fill="#efe8d8"/>
  <polygon points="407,330 442,374 407,374" fill="#f8f4ea"/>
  <polygon points="407,374 442,374 407,418" fill="#cfc4a9"/>
  <polygon points="372,374 407,374 407,418" fill="#bfb294"/>
  <!-- diamond 2 -->
  <polygon points="477,330 512,374 477,418 442,374" fill="#efe8d8"/>
  <polygon points="477,330 512,374 477,374" fill="#f8f4ea"/>
  <polygon points="477,374 512,374 477,418" fill="#cfc4a9"/>
  <polygon points="442,374 477,374 477,418" fill="#bfb294"/>
  <!-- diamond 3 -->
  <polygon points="547,330 582,374 547,418 512,374" fill="#efe8d8"/>
  <polygon points="547,330 582,374 547,374" fill="#f8f4ea"/>
  <polygon points="547,374 582,374 547,418" fill="#cfc4a9"/>
  <polygon points="512,374 547,374 547,418" fill="#bfb294"/>
  <!-- diamond 4 -->
  <polygon points="617,330 652,374 617,418 582,374" fill="#efe8d8"/>
  <polygon points="617,330 652,374 617,374" fill="#f8f4ea"/>
  <polygon points="617,374 652,374 617,418" fill="#cfc4a9"/>
  <polygon points="582,374 617,374 617,418" fill="#bfb294"/>

  <!-- neck ring -->
  <rect x="390" y="418" width="244" height="16" rx="6" fill="#e6ddc8"/>

  <!-- shaft -->
  <rect x="402" y="434" width="220" height="314" fill="url(#stone)"/>
  <line x1="446" y1="440" x2="446" y2="742" stroke="#c6b99e" stroke-width="7" stroke-linecap="round"/>
  <line x1="490" y1="440" x2="490" y2="742" stroke="#c6b99e" stroke-width="7" stroke-linecap="round"/>
  <line x1="534" y1="440" x2="534" y2="742" stroke="#c6b99e" stroke-width="7" stroke-linecap="round"/>
  <line x1="578" y1="440" x2="578" y2="742" stroke="#c6b99e" stroke-width="7" stroke-linecap="round"/>

  <!-- base -->
  <rect x="386" y="748" width="252" height="26" rx="10" fill="#e6ddc8"/>
  <rect x="364" y="774" width="296" height="30" rx="8" fill="url(#stone)"/>
  <rect x="342" y="804" width="340" height="34" rx="8" fill="#cdc2aa"/>
</svg>
